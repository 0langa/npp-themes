name: Feature request
description: Propose focused appearance or workspace improvement
title: '[Feature] '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Explain workflow or appearance problem, not only proposed control.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundary
    attributes:
      label: Stable API boundary
      options:
        - label: Proposal does not require private Notepad++ APIs, binary patching, or internal messages.
          required: true
