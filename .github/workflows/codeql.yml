name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: Configure
        run: cmake --preset x64

      - name: Build
        run: cmake --build --preset x64-release --parallel

      - name: Analyze
        uses: github/codeql-action/analyze@v3
