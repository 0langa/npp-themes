name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            run_tests: true
          - arch: x86
            run_tests: true
          - arch: arm64
            run_tests: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        shell: pwsh
        run: "'VERSION=' + $env:GITHUB_REF_NAME.TrimStart('v') | Out-File -FilePath $env:GITHUB_ENV -Append"

      - name: Configure
        run: cmake --preset ${{ matrix.arch }}

      - name: Build
        run: cmake --build --preset ${{ matrix.arch }}-release --parallel

      - name: Test
        if: matrix.run_tests
        run: ctest --test-dir out/build/${{ matrix.arch }} -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: .\tools\package.ps1 -Architecture ${{ matrix.arch }} -Version $env:VERSION

      - name: Verify package
        shell: pwsh
        run: .\tools\test-package.ps1 -Architecture ${{ matrix.arch }} -Version $env:VERSION

      - name: Upload release package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/NppThemes-${{ env.VERSION }}-${{ matrix.arch }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum *.zip > SHA256SUMS.txt

      - name: Attest release archives
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'release-assets/*.zip'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "$GITHUB_REF_NAME" == v0.* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "NppThemes $GITHUB_REF_NAME" "${release_flags[@]}"
